<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Audio and Video Project</title>
</head>
<body>
    <h1>This is my Audio and Video project</h1>
    <h2>Audio and Video Section</h2>

    <section>
        <h3>Audio Controls for Playback</h3>
        <audio 
            src="https://cdn.freecodecamp.org/curriculum/js-music-player/can't-stay-down.mp3"
            controls
            loop>
        </audio>

        <h3>Video Controls for Playback</h3>
        <video 
            src="https://archive.org/download/BigBuckBunny_124/Content/big_buck_bunny_720p_surround.mp4"
            loop 
            controls 
            muted 
            poster="https://peach.blender.org/wp-content/uploads/title_anouncement.jpg?x11217"
            width="640">
        </video>
    </section>
    <section>
        <h3>External Video from iFrame Element</h3>
        <iframe 
            src="https://www.openstreetmap.org/export/embed.html?bbox=3.006134033203125%2C6.150112578753815%2C3.6357879638671875%2C6.749850810550778&amp;layer=mapnik"
            title="Map of Nigeria"
            width="500" 
            height="285" 
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
        </iframe>
        <br />
          <small>
            <a href="https://www.openstreetmap.org/#map=11/6.4501/3.3210">
                View Larger Map
            </a>
          </small>
    </section>
</body>
</html>
